<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RocketMQ AI Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .chat-container {
            width: 100%;
            height: 100vh;
            background: white;
            border-radius: 0;
            box-shadow: none;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
            text-align: center;
        }

        .sidebar-content {
            flex: 1;
            padding: 40px 20px;
            color: #718096;
            font-size: 0.9rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: #2d3748;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .chat-header .subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #4299e1;
        }

        #sendButton {
            padding: 15px 25px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        #sendButton:hover {
            background: #3182ce;
        }

        #sendButton:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }

        .message {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease-in;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.ai {
            align-items: flex-start;
        }

        .message-timestamp {
            font-size: 0.8rem;
            color: #a0aec0;
            margin-bottom: 5px;
            padding: 0 10px;
        }

        .message.user .message-timestamp {
            text-align: right;
        }

        .message.ai .message-timestamp {
            text-align: left;
        }

        .message-wrapper {
            display: flex;
            align-items: flex-start;
        }

        .message.user .message-wrapper {
            justify-content: flex-end;
        }

        .message.ai .message-wrapper {
            justify-content: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user .avatar {
            background: #4299e1;
            color: white;
        }

        .ai .avatar {
            background: #48bb78;
            color: white;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
        }

        .user .message-content {
            background: #4299e1;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai .message-content {
            background: white;
            color: #2d3748;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 5px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid #e2e8f0;
        }

        .iteration-info {
            font-size: 0.85rem;
            font-weight: 600;
            color: #4a5568;
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .timestamp {
            font-size: 0.8rem;
            color: #a0aec0;
            /* 移除原有的timestamp样式，因为现在时间显示在外部 */
        }

        /* 流式内容分类显示样式 */
        .streaming-sections {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .streaming-section {
            border-left: 4px solid #e2e8f0;
            padding-left: 15px;
            margin: 5px 0;
        }

        .streaming-section-reasoning {
            border-left-color: #4299e1;
            background: rgba(66, 153, 225, 0.05);
        }

        .streaming-section-thinking {
            border-left-color: #4299e1;
            background: rgba(66, 153, 225, 0.05);
        }

        .streaming-section-tool {
            border-left-color: #48bb78;
            background: rgba(72, 187, 120, 0.05);
        }

        .streaming-section-answer {
            border-left-color: #ed8936;
            background: rgba(237, 137, 54, 0.05);
        }

        .streaming-section-knowledge {
            border-left-color: #9f7aea;
            background: rgba(159, 122, 234, 0.05);
        }

        /* 工具执行区域样式 */
        .tool-section {
            border-left: 4px solid #48bb78;
            background: rgba(72, 187, 120, 0.05);
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .tool-status-start {
            color: #3182ce;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .tool-status-completed {
            color: #38a169;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .tool-status-error {
            color: #e53e3e;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .tool-details {
            margin-top: 8px;
            padding-left: 10px;
            border-left: 2px solid #e2e8f0;
        }

        .tool-result, .tool-error {
            font-size: 0.9rem;
            color: #4a5568;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 知识库查询区域样式 */
        .knowledge-section {
            border-left: 4px solid #9f7aea;
            background: rgba(159, 122, 234, 0.05);
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .knowledge-status-start {
            color: #805ad5;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-status-searching {
            color: #6b46c1;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-status-success {
            color: #38a169;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-status-no-results {
            color: #d69e2e;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-status-error {
            color: #e53e3e;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-status-skipped {
            color: #718096;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .knowledge-details {
            margin-top: 8px;
            padding-left: 10px;
            border-left: 2px solid #e2e8f0;
        }

        .knowledge-query-info {
            font-size: 0.85rem;
            color: #718096;
            margin-bottom: 3px;
        }

        .knowledge-result {
            font-size: 0.9rem;
            color: #4a5568;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
        }

        .knowledge-count {
            display: inline-block;
            background: #9f7aea;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .section-header {
            margin-bottom: 8px;
        }

        .section-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .streaming-content {
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #48bb78;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.2); opacity: 0.7; }
        }

        .streaming {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* ========== 新的独立消息卡片样式 ========== */
        .msg-card {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            animation: fadeIn 0.35s ease-out;
            gap: 10px;
        }

        .msg-card .msg-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .msg-card .msg-body {
            flex: 1;
            min-width: 0;
            background: white;
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
            transition: box-shadow 0.2s;
            max-width: 85%;
        }

        .msg-card .msg-body:hover {
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }

        .msg-card .msg-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .msg-card .msg-meta .msg-label {
            font-weight: 600;
            font-size: 0.8rem;
            padding: 1px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .msg-card .msg-text {
            font-size: 0.95rem;
            line-height: 1.65;
            color: #334155;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .msg-card .msg-text pre {
            background: #f1f5f9;
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            overflow-x: auto;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
        }

        /* --- 不同类型消息的颜色方案 --- */
        /* 系统/状态消息 */
        .msg-card.msg-status .msg-icon { background: #eef2ff; color: #6366f1; }
        .msg-card.msg-status .msg-body { border-left: 3px solid #818cf8; background: #fafbff; }
        .msg-card.msg-status .msg-label { background: #eef2ff; color: #6366f1; }

        /* 意图识别 */
        .msg-card.msg-intent .msg-icon { background: #fef3c7; color: #d97706; }
        .msg-card.msg-intent .msg-body { border-left: 3px solid #f59e0b; background: #fffdf5; }
        .msg-card.msg-intent .msg-label { background: #fef3c7; color: #d97706; }

        /* 知识库查询 */
        .msg-card.msg-knowledge .msg-icon { background: #f3e8ff; color: #9333ea; }
        .msg-card.msg-knowledge .msg-body { border-left: 3px solid #a855f7; background: #fdfaff; }
        .msg-card.msg-knowledge .msg-label { background: #f3e8ff; color: #9333ea; }

        /* 工具执行 */
        .msg-card.msg-tool .msg-icon { background: #dcfce7; color: #16a34a; }
        .msg-card.msg-tool .msg-body { border-left: 3px solid #22c55e; background: #f8fef9; }
        .msg-card.msg-tool .msg-label { background: #dcfce7; color: #16a34a; }

        /* 思考/推理 */
        .msg-card.msg-reasoning .msg-icon { background: #e0f2fe; color: #0284c7; }
        .msg-card.msg-reasoning .msg-body { border-left: 3px solid #38bdf8; background: #f5fbff; }
        .msg-card.msg-reasoning .msg-label { background: #e0f2fe; color: #0284c7; }

        /* 迭代 */
        .msg-card.msg-iteration .msg-icon { background: #fce7f3; color: #db2777; }
        .msg-card.msg-iteration .msg-body { border-left: 3px solid #ec4899; background: #fef7fb; }
        .msg-card.msg-iteration .msg-label { background: #fce7f3; color: #db2777; }

        /* 最终答案 */
        .msg-card.msg-answer .msg-icon { background: #d1fae5; color: #059669; }
        .msg-card.msg-answer .msg-body { border-left: 3px solid #10b981; background: #f0fdf7; }
        .msg-card.msg-answer .msg-label { background: #d1fae5; color: #059669; }
        .msg-card.msg-answer .msg-text { font-size: 1rem; }

        /* 错误 */
        .msg-card.msg-error .msg-icon { background: #fee2e2; color: #dc2626; }
        .msg-card.msg-error .msg-body { border-left: 3px solid #ef4444; background: #fef5f5; }
        .msg-card.msg-error .msg-label { background: #fee2e2; color: #dc2626; }

        /* 完成 */
        .msg-card.msg-completion .msg-icon { background: #d1fae5; color: #059669; }
        .msg-card.msg-completion .msg-body {
            border-left: 3px solid #10b981;
            background: linear-gradient(135deg, #f0fdf7 0%, #ecfdf5 100%);
        }
        .msg-card.msg-completion .msg-label { background: #d1fae5; color: #059669; }
        .msg-card.msg-completion .msg-text {
            font-weight: 600;
            color: #059669;
        }

        /* 工具结果区域的折叠样式 */
        .msg-card .tool-result-block {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
        }

        .msg-card .tool-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: #f1f5f9;
            cursor: pointer;
            user-select: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }

        .msg-card .tool-result-header:hover {
            background: #e2e8f0;
        }

        .msg-card .tool-result-body {
            padding: 10px 12px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.82rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            color: #334155;
        }

        .msg-card .tool-result-body.collapsed {
            display: none;
        }

        /* 知识库预览链接区域 */
        .msg-card .knowledge-preview-area {
            margin-top: 10px;
            padding: 8px;
            background: rgba(66, 153, 225, 0.08);
            border-radius: 8px;
        }

        /* 消息淡入动画增强 */
        @keyframes msgSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-card {
            animation: msgSlideIn 0.3s ease-out;
        }

        /* ========== 打字机效果 ========== */
        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: #6366f1;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: cursorBlink 0.7s ease-in-out infinite;
            border-radius: 1px;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 打字中的卡片左边框呼吸灯效果 */
        .msg-card.typing .msg-body {
            box-shadow: 0 1px 8px rgba(99, 102, 241, 0.12);
        }

        /* 消息队列指示器 */
        .queue-indicator {
            position: fixed;
            bottom: 90px;
            right: 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            z-index: 100;
            display: none;
            animation: fadeIn 0.3s ease-out;
            backdrop-filter: blur(8px);
        }

        .queue-indicator.visible {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .queue-indicator .queue-dot {
            width: 6px;
            height: 6px;
            background: #fbbf24;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* AI消息wrapper样式简化 - 保留用户消息兼容 */
        .message.ai .message-wrapper {
            justify-content: flex-start;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <!-- 左侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🤖 Taether</h2>
            <div class="subtitle">RocketMQ AI Agent</div>
        </div>
        <div class="sidebar-content">
            <div>
                <p style="font-size: 0.8rem; margin-top: 10px;">1. 当前是小模型，无记忆，无上下文联系</p>
                <p style="font-size: 0.8rem; margin-top: 10px;">2. 目前用于RocketMQ相关问题处理</p>
            </div>
        </div>
    </div>

    <!-- 右侧主内容区 -->
    <div class="main-content">
        <div class="chat-header">
            <h1>🤖 RocketMQ AI Agent</h1>
            <div class="subtitle">for tce and tcs</div>
        </div>

        <div class="messages-container" id="messages">
            <div class="message ai">
                <div class="message-timestamp">Just now</div>
                <div class="message-wrapper">
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        Hello! I'm Taether, your rocketmq assistant. How can I help you today?
                    </div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input autocomplete="off" id="messageInput" placeholder="Ask me about rocketmq..." type="text">
                <button id="sendButton" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    const wsProtocol = window.location.protocol === "https:" ? "wss" : "ws";
    const wsUrl = `${wsProtocol}://${window.location.host}/ws`;
    const ws = new WebSocket(wsUrl);
    const messagesDiv = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    let isTyping = false;
    let isProcessing = false; // 标记是否正在处理请求

    // Auto-scroll to bottom
    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Add user message
    function addUserMessage(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user';
        messageDiv.innerHTML = `
            <div class="message-timestamp">${new Date().toLocaleTimeString()}</div>
            <div class="message-wrapper">
                <div class="message-content">
                    ${content}
                </div>
                <div class="avatar">U</div>
            </div>
        `;
        messagesDiv.appendChild(messageDiv);
        scrollToBottom();
    }

    // Add AI message
    function addAIMessage(content) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message ai';

        // 将\\n替换为实际的换行符
        const formattedContent = content.replace(/\\n/g, '<br />');

        let timeInfo = `<div class=\"timestamp\">${new Date().toLocaleTimeString()}</div>`;

        messageDiv.innerHTML = `
            <div class=\"avatar\">AI</div>
            <div class=\"message-content\">
                ${formattedContent}
                ${timeInfo}
            </div>
        `;
        messagesDiv.appendChild(messageDiv);
        scrollToBottom();
    }

    // Show typing indicator
    function showTypingIndicator() {
        if (isTyping) return;
        isTyping = true;

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.id = 'typing-indicator';
        typingDiv.innerHTML = `
            <div class="avatar">AI</div>
            <div class="message-content">
                <div class="typing-indicator">
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>
        `;
        messagesDiv.appendChild(typingDiv);
        scrollToBottom();
    }

    // Hide typing indicator
    function hideTypingIndicator() {
        const typingDiv = document.getElementById('typing-indicator');
        if (typingDiv) {
            typingDiv.remove();
        }
        isTyping = false;
    }

    // ================================================================
    //  消息缓冲队列 + 打字机渲染引擎
    // ================================================================
    let isStreaming = false;

    // --- 消息队列 ---
    const msgQueue = [];           // 待渲染消息队列
    let typewriterBusy = false;    // 打字机是否正在工作
    const CHARS_PER_SEC = 30;       // 每秒输出字符数
    const CHAR_INTERVAL = Math.round(1000 / CHARS_PER_SEC); // ≈333ms

    // --- 队列指示器 DOM ---
    const queueIndicator = document.createElement('div');
    queueIndicator.className = 'queue-indicator';
    queueIndicator.innerHTML = '<span class="queue-dot"></span><span class="queue-count">队列: 0</span>';
    document.body.appendChild(queueIndicator);

    function updateQueueIndicator() {
        const cnt = msgQueue.length;
        if (cnt > 0) {
            queueIndicator.querySelector('.queue-count').textContent = `队列: ${cnt}`;
            queueIndicator.classList.add('visible');
        } else {
            queueIndicator.classList.remove('visible');
        }
    }

    // --- 安全转义HTML ---
    function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // --- 将文本中的特殊序列转换为显示用的 token 列表 ---
    // 返回 token 数组，每个 token 是最小不可拆分单元
    // 例如 "<br/>" 或 "&lt;" 作为一个 token，普通字符各一个 token
    function tokenizeHtml(html) {
        const tokens = [];
        let i = 0;
        while (i < html.length) {
            // HTML 标签: <br/>, <strong>, </strong>, <div ...>...</div> 等
            if (html[i] === '<') {
                const end = html.indexOf('>', i);
                if (end !== -1) {
                    const tag = html.substring(i, end + 1);
                    // 对自闭合标签或短标签整体作为一个token
                    tokens.push(tag);
                    i = end + 1;
                    continue;
                }
            }
            // HTML 实体: &lt; &gt; &amp; 等
            if (html[i] === '&') {
                const semiIdx = html.indexOf(';', i);
                if (semiIdx !== -1 && semiIdx - i < 10) {
                    tokens.push(html.substring(i, semiIdx + 1));
                    i = semiIdx + 1;
                    continue;
                }
            }
            // emoji: 多码点字符（使用 codePoint 检测）
            const cp = html.codePointAt(i);
            if (cp > 0xFFFF) {
                // 4字节UTF-16（surrogate pair）
                tokens.push(html.substring(i, i + 2));
                i += 2;
            } else {
                tokens.push(html[i]);
                i++;
            }
        }
        return tokens;
    }

    // --- 创建空卡片骨架，返回 { card, textEl } ---
    function createCardSkeleton(type, icon, label, extra) {
        const card = document.createElement('div');
        card.className = `msg-card msg-${type} typing`;
        const time = new Date().toLocaleTimeString();
        card.innerHTML = `
            <div class="msg-icon">${icon}</div>
            <div class="msg-body">
                <div class="msg-meta">
                    <span class="msg-label">${label}</span>
                    <span>${time}</span>
                    ${extra ? `<span>${extra}</span>` : ''}
                </div>
                <div class="msg-text"><span class="typewriter-cursor"></span></div>
            </div>
        `;
        messagesDiv.appendChild(card);
        scrollToBottom();
        const textEl = card.querySelector('.msg-text');
        return { card, textEl };
    }

    // --- 打字机核心：逐 token 渲染到 textEl ---
    function typewriteTokens(textEl, tokens) {
        return new Promise((resolve) => {
            let idx = 0;
            const cursor = textEl.querySelector('.typewriter-cursor');

            function tick() {
                if (idx >= tokens.length) {
                    // 打字完成，移除光标
                    if (cursor) cursor.remove();
                    resolve();
                    return;
                }
                const tk = tokens[idx];
                // 在光标前插入 token
                if (cursor) {
                    // 如果token是HTML标签，用innerHTML方式插入
                    if (tk.startsWith('<')) {
                        const temp = document.createElement('span');
                        temp.innerHTML = tk;
                        while (temp.firstChild) {
                            textEl.insertBefore(temp.firstChild, cursor);
                        }
                    } else {
                        // 文本节点或HTML实体
                        const span = document.createElement('span');
                        span.innerHTML = tk;
                        textEl.insertBefore(span, cursor);
                    }
                }
                idx++;
                scrollToBottom();

                // 对 HTML 标签跳过延迟，直接进入下一个
                if (tk.startsWith('<') || tk.startsWith('&')) {
                    requestAnimationFrame(tick);
                } else {
                    setTimeout(tick, CHAR_INTERVAL);
                }
            }
            tick();
        });
    }

    // --- 即时渲染（对工具、知识库等复杂卡片不做打字效果） ---
    function createMsgCardInstant(type, icon, label, bodyHtml, extra) {
        const card = document.createElement('div');
        card.className = `msg-card msg-${type}`;
        const time = new Date().toLocaleTimeString();
        card.innerHTML = `
            <div class="msg-icon">${icon}</div>
            <div class="msg-body">
                <div class="msg-meta">
                    <span class="msg-label">${label}</span>
                    <span>${time}</span>
                    ${extra ? `<span>${extra}</span>` : ''}
                </div>
                <div class="msg-text">${bodyHtml}</div>
            </div>
        `;
        messagesDiv.appendChild(card);
        scrollToBottom();
        return card;
    }

    // --- 消费队列 ---
    async function processQueue() {
        if (typewriterBusy) return;
        typewriterBusy = true;

        while (msgQueue.length > 0) {
            updateQueueIndicator();
            const item = msgQueue.shift();

            if (item.instant) {
                // 即时渲染（工具、知识库等含交互的卡片）
                const card = createMsgCardInstant(item.type, item.icon, item.label, item.html, item.extra);
                if (item.afterRender) item.afterRender(card);
            } else {
                // 打字机渲染
                const tokens = tokenizeHtml(item.html);
                const { card, textEl } = createCardSkeleton(item.type, item.icon, item.label, item.extra);
                await typewriteTokens(textEl, tokens);
                card.classList.remove('typing');
                if (item.afterRender) item.afterRender(card);
            }
            updateQueueIndicator();
        }

        typewriterBusy = false;
        updateQueueIndicator();
    }

    // --- 入队辅助 ---
    function enqueueMsg(type, icon, label, html, extra, opts) {
        msgQueue.push({ type, icon, label, html, extra: extra || '', instant: !!(opts && opts.instant), afterRender: opts && opts.afterRender });
        updateQueueIndicator();
        processQueue();
    }

    // ---------- 将纯文本中的 emoji 前缀映射到卡片类型 ----------
    function classifyPlainText(text) {
        if (text.includes('🧠') || text.includes('正在识别'))
            return { type: 'status', icon: '🧠', label: '意图识别' };
        if (text.includes('✅ 用户意图识别') || text.includes('意图'))
            return { type: 'intent', icon: '🎯', label: '意图结果' };
        if (text.includes('📚') || text.includes('知识库'))
            return { type: 'knowledge', icon: '📚', label: '知识库' };
        if (text.includes('🧰') || text.includes('检索工具'))
            return { type: 'tool', icon: '🧰', label: '工具检索' };
        if (text.includes('🛠️') || text.includes('skills'))
            return { type: 'tool', icon: '🛠️', label: 'Skills检索' };
        if (text.includes('🔧') || text.includes('排查') || text.includes('AI分析'))
            return { type: 'reasoning', icon: '🔧', label: '分析中' };
        if (text.includes('📊'))
            return { type: 'knowledge', icon: '📊', label: '知识库' };
        if (text.includes('📭'))
            return { type: 'status', icon: '📭', label: '无结果' };
        if (text.includes('⚠️'))
            return { type: 'error', icon: '⚠️', label: '警告' };
        if (text.includes('❌'))
            return { type: 'error', icon: '❌', label: '错误' };
        if (text.includes('🤖'))
            return { type: 'answer', icon: '🤖', label: 'AI回答' };
        return { type: 'status', icon: 'AI', label: '消息' };
    }

    // ---------- ws.onmessage — 收到消息先入队 ----------
    ws.onmessage = function(event) {
        const response = event.data;
        hideTypingIndicator();
        isStreaming = true;

        // 尝试解析JSON流式数据
        try {
            const data = JSON.parse(response);
            if (data.type === 'stream_chunk' || data.content_type || data.is_tool_call) {
                handleStreamChunk(data);
                return;
            }
        } catch (e) {
            // 非JSON，按纯文本处理
        }

        // 忽略空消息
        const trimmed = response.trim();
        if (!trimmed || trimmed === '---') return;

        // 根据文本内容分类，入队打字机渲染
        const cls = classifyPlainText(trimmed);
        const safeHtml = escHtml(trimmed).replace(/\n/g, '<br/>');
        enqueueMsg(cls.type, cls.icon, cls.label, safeHtml);
    };

    // ---------- 处理JSON流式分块数据 ----------
    function handleStreamChunk(data) {
        // 处理完成消息 → 恢复输入
        if (data.content_type === 'completion' || data.is_completed) {
            isStreaming = false;
            enqueueMsg('completion', '✅', '处理完成',
                escHtml('请求已处理完毕'), '', {
                afterRender: function() {
                    isProcessing = false;
                    sendButton.disabled = false;
                    messageInput.disabled = false;
                    messageInput.focus();
                }
            });
            return;
        }

        const iterCount = data.iteration_count || 0;

        // 工具调用 — 即时渲染（含交互）
        if (data.is_tool_call) {
            handleToolCallCard(data);
            return;
        }

        // 知识库查询 — 即时渲染（含交互）
        if (data.content_type === 'knowledge' || data.is_knowledge_query) {
            handleKnowledgeCard(data);
            return;
        }

        const content = data.content || '';
        const contentType = data.content_type || 'text';

        // 根据content_type映射卡片类型
        const typeMap = {
            'reasoning': { type: 'reasoning', icon: '🤔', label: '思考' },
            'iteration': { type: 'iteration', icon: '🔄', label: `迭代 ${iterCount}` },
            'final_answer': { type: 'answer', icon: '💡', label: '最终回答' },
            'text': { type: 'status', icon: '💬', label: '响应' },
            'tool': { type: 'tool', icon: '🔧', label: '工具' },
        };
        const cfg = typeMap[contentType] || typeMap['text'];

        const safeContent = escHtml(content).replace(/\n/g, '<br/>');
        enqueueMsg(cfg.type, cfg.icon, cfg.label, safeContent);
    }

    // ---------- 工具调用卡片（即时渲染） ----------
    function handleToolCallCard(data) {
        const toolName = data.tool_name || data.toolName || data.name || '工具';
        const toolStatus = data.tool_status || 'start';

        let tool_command = '';
        if (data.tool_args) {
            tool_command = data.tool_args.command || data.tool_args.query || data.tool_args.path ||
                         data.tool_args.file || data.tool_args.function_name ||
                         JSON.stringify(data.tool_args, null, 2);
        }

        let bodyHtml = '';
        switch (toolStatus) {
            case 'start':
                bodyHtml = `🔧 开始执行: <strong>${escHtml(toolName)}</strong>` +
                    (tool_command ? `<div style="margin-top:6px;padding:8px;background:#f1f5f9;border-radius:6px;font-family:monospace;font-size:0.85rem;">${escHtml(tool_command)}</div>` : '');
                break;
            case 'completed': {
                const result = data.tool_result || '无结果';
                const resultId = 'tr-' + Date.now() + '-' + Math.random().toString(36).slice(2,6);
                bodyHtml = `✅ <strong>${escHtml(toolName)}</strong> 执行完成` +
                    `<div class="tool-result-block">
                        <div class="tool-result-header" onclick="(function(el){var b=el.nextElementSibling;b.classList.toggle('collapsed');el.querySelector('.arrow').textContent=b.classList.contains('collapsed')?'▶':'▼';})(this)">
                            <span>📋 执行结果</span><span class="arrow">▼</span>
                        </div>
                        <div class="tool-result-body" id="${resultId}">${escHtml(result)}</div>
                    </div>`;
                break;
            }
            case 'error': {
                const errorMsg = data.tool_error || '未知错误';
                bodyHtml = `❌ <strong>${escHtml(toolName)}</strong> 执行失败` +
                    `<div style="margin-top:6px;padding:8px;background:#fef2f2;border-radius:6px;color:#991b1b;font-size:0.9rem;">${escHtml(errorMsg).replace(/\n/g,'<br/>')}</div>`;
                break;
            }
        }

        const icon = toolStatus === 'error' ? '❌' : (toolStatus === 'completed' ? '✅' : '🔧');
        enqueueMsg('tool', icon, `工具: ${toolName}`, bodyHtml, '', { instant: true });
    }

    // ---------- 知识库查询卡片（即时渲染） ----------
    function handleKnowledgeCard(data) {
        const status = data.knowledge_status || 'start';
        const content = data.content || '';
        const domain = data.knowledge_domain || '';
        const query = data.knowledge_query || '';
        const count = data.knowledge_count || 0;
        const result = data.knowledge_result || '';

        let bodyHtml = '';
        let afterRender = null;
        switch (status) {
            case 'start':
                bodyHtml = escHtml(content);
                break;
            case 'searching':
                bodyHtml = escHtml(content) +
                    (domain ? `<div style="font-size:0.85rem;color:#718096;margin-top:4px;">领域: ${escHtml(domain)} | 关键词: ${escHtml(query)}</div>` : '');
                break;
            case 'success': {
                const previewLinksId = `kpl-${Date.now()}-${Math.random().toString(36).slice(2,5)}`;
                bodyHtml = `${escHtml(content)} <span class="knowledge-count">${count}</span>` +
                    (result ? `<div style="margin-top:8px;max-height:200px;overflow-y:auto;background:#fafafa;padding:10px;border-radius:6px;font-size:0.9rem;border:1px solid #e2e8f0;">${escHtml(result)}</div>` : '') +
                    `<div class="knowledge-preview-area" id="${previewLinksId}"></div>`;
                const _previewItems = data.preview_items;
                afterRender = function() {
                    setTimeout(function() {
                        if (_previewItems && _previewItems.length > 0) {
                            createPreviewLinksFromArray(_previewItems, previewLinksId);
                        }
                    }, 100);
                };
                break;
            }
            case 'no_results':
                bodyHtml = `📭 ${escHtml(content)}`;
                break;
            case 'error':
                bodyHtml = `❌ ${escHtml(content)}`;
                break;
            case 'skipped':
                bodyHtml = `⚠️ ${escHtml(content)}`;
                break;
            default:
                bodyHtml = escHtml(content);
        }

        const iconMap = { start: '📚', searching: '🔍', success: '✅', no_results: '📭', error: '❌', skipped: '⚠️' };
        enqueueMsg('knowledge', iconMap[status] || '📚', '知识库查询', bodyHtml, '', { instant: true, afterRender: afterRender });
    }

    // (旧的 handleToolCallData 和 createToolSection 已迁移到 handleToolCallCard)

    // (旧的 handleKnowledgeQueryData 和 createKnowledgeSection 已迁移到 handleKnowledgeCard)

    // 解析知识库结果中的文档链接并添加预览功能
    function parseKnowledgeResultsForPreview(resultHtml, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        // 创建临时元素来解析HTML
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = resultHtml;
        
        // 查找所有包含预览信息的知识条目
        const knowledgeItems = tempDiv.querySelectorAll('h3');
        
        knowledgeItems.forEach((item, index) => {
            // 获取整个知识条目的文本内容
            let currentElement = item;
            let itemText = '';
            
            // 收集从h3开始到下一个h3或结束的所有文本
            while (currentElement && currentElement.nextSibling) {
                currentElement = currentElement.nextSibling;
                if (currentElement.nodeType === Node.TEXT_NODE) {
                    itemText += currentElement.textContent;
                } else if (currentElement.nodeType === Node.ELEMENT_NODE) {
                    if (currentElement.tagName === 'H3') {
                        break; // 遇到下一个h3就停止
                    }
                    itemText += currentElement.textContent || '';
                }
            }
            
            // 检查各种类型的预览信息
            const docLinkMatch = itemText.match(/📄 文档链接[:：]\s*([^\n|]+)/);
            const filePathMatch = itemText.match(/📁 文件路径[:：]\s*([^\n|]+)/);
            const itemIdMatch = itemText.match(/🆔 条目ID[:：]\s*([^\n|]+)/);
            const previewAvailableMatch = itemText.match(/🔍 支持预览/);
            
            // 创建预览链接容器
            const previewContainer = document.createElement('div');
            previewContainer.className = 'preview-links-container';
            previewContainer.style.cssText = `
                margin-top: 10px;
                padding: 8px;
                background: rgba(66, 153, 225, 0.1);
                border-radius: 4px;
                border-left: 3px solid #4299e1;
            `;
            
            let hasPreviewOptions = false;
            
            // 添加文档链接预览
            if (docLinkMatch) {
                const linkText = docLinkMatch[1].trim();
                const previewLink = createPreviewLink('📄 预览文档链接', linkText, 'url', index);
                previewContainer.appendChild(previewLink);
                hasPreviewOptions = true;
            }
            
            // 添加文件路径预览
            if (filePathMatch) {
                const pathText = filePathMatch[1].trim();
                const previewLink = createPreviewLink('📁 预览文件内容', pathText, 'file', index);
                previewContainer.appendChild(previewLink);
                hasPreviewOptions = true;
            }
            
            // 添加知识条目完整内容预览
            if (itemIdMatch && previewAvailableMatch) {
                const itemId = itemIdMatch[1].trim();
                const previewLink = createPreviewLink('🔍 预览完整内容', itemId, 'item', index);
                previewContainer.appendChild(previewLink);
                hasPreviewOptions = true;
            }
            
            // 如果有预览选项，添加到容器中
            if (hasPreviewOptions) {
                container.appendChild(previewContainer);
            }
        });
    }
    
    // 使用预览项目数组创建预览链接
    function createPreviewLinksFromArray(previewItems, containerId) {
        const container = document.getElementById(containerId);
        if (!container || !previewItems || previewItems.length === 0) return;
        
        // 创建预览链接容器
        const previewContainer = document.createElement('div');
        previewContainer.className = 'preview-links-container';
        previewContainer.style.cssText = `
            margin-top: 10px;
            padding: 8px;
            background: rgba(66, 153, 225, 0.1);
            border-radius: 4px;
            border-left: 3px solid #4299e1;
        `;
        
        // 为每个预览项目创建链接
        previewItems.forEach((item, index) => {
            const previewLink = document.createElement('a');
            previewLink.href = '#';
            previewLink.className = 'doc-preview-link';
            previewLink.style.cssText = `
                display: inline-block;
                margin: 2px 5px 2px 0;
                padding: 4px 8px;
                background: #4299e1;
                color: white;
                text-decoration: none;
                border-radius: 3px;
                font-size: 0.85rem;
                transition: background-color 0.2s;
            `;
            
            previewLink.textContent = item.label;
            previewLink.dataset.type = item.type;
            previewLink.dataset.id = item.id;
            previewLink.dataset.index = index;
            
            // 根据类型设置额外的数据属性
            if (item.type === 'file' && item.path) {
                previewLink.dataset.path = item.path;
            } else if (item.type === 'url' && item.url) {
                previewLink.dataset.url = item.url;
            } else if (item.type === 'item' && item.item_id) {
                previewLink.dataset.itemId = item.item_id;
            }
            
            previewLink.addEventListener('click', function(e) {
                e.preventDefault();
                showDocumentPreviewFromArray(this.dataset);
            });
            
            previewLink.addEventListener('mouseenter', function() {
                this.style.background = '#3182ce';
            });
            
            previewLink.addEventListener('mouseleave', function() {
                this.style.background = '#4299e1';
            });
            
            previewContainer.appendChild(previewLink);
        });
        
        container.appendChild(previewContainer);
    }
    
    // 创建预览链接
    function createPreviewLink(text, link, type, index) {
        const previewLink = document.createElement('a');
        previewLink.href = '#';
        previewLink.className = 'doc-preview-link';
        previewLink.style.cssText = `
            display: inline-block;
            margin: 2px 5px 2px 0;
            padding: 4px 8px;
            background: #4299e1;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: background 0.2s;
        `;
        previewLink.textContent = text;
        previewLink.dataset.link = link;
        previewLink.dataset.type = type;
        previewLink.dataset.index = index;
        
        previewLink.addEventListener('click', function(e) {

            showDocumentPreview(this.dataset.link, this.dataset.type, this.dataset.index);

            this.style.background = '#3182ce';
        });
        
        previewLink.addEventListener('mouseleave', function() {
            this.style.background = '#4299e1';
        });
        
        return previewLink;
    }

        // 添加标题和来源信息

            if (e.key === 'Escape') {

        // 加载文档内容
        loadDocumentContent(link, type, contentArea);

    // 加载文档内容（需要后端API支持）
    function loadDocumentContent(link, type, contentArea) {
        // 调用后端API获取文档内容
        const params = new URLSearchParams();
        
        if (type === 'url') {
            params.append('source_url', link);
        } else if (type === 'file') {
            params.append('file_path', link);
        } else if (type === 'item') {
            params.append('item_id', link);
        }
        
        fetch(`/api/knowledge/preview?${params}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // 成功加载内容
                    contentArea.innerHTML = '';
                    
                    // 如果有元数据，显示元数据信息
                    if (data.metadata && type === 'item') {
                        const metadataDiv = document.createElement('div');
                        metadataDiv.style.cssText = `
                            background: #f8fafc;
                            padding: 15px;
                            border-radius: 6px;
                            margin-bottom: 15px;
                            border-left: 4px solid #4299e1;
                        `;
                        
                        const metadataHtml = `
                            <div style="font-weight: 600; color: #2d3748; margin-bottom: 8px;">📋 文档信息</div>
                            <div style="font-size: 0.9rem; color: #4a5568; line-height: 1.4;">
                                <div><strong>标题:</strong> ${data.metadata.title || '无标题'}</div>
                                <div><strong>领域:</strong> ${data.metadata.domain || '未知'}</div>
                                <div><strong>分类:</strong> ${data.metadata.category || '未知'}</div>
                                <div><strong>标签:</strong> ${(data.metadata.tags || []).join(', ') || '无标签'}</div>
                                <div><strong>创建时间:</strong> ${data.metadata.created_at ? new Date(data.metadata.created_at).toLocaleString() : '未知'}</div>
                                ${data.metadata.source_url ? `<div><strong>原始链接:</strong> ${data.metadata.source_url}</div>` : ''}
                                ${data.metadata.file_path ? `<div><strong>文件路径:</strong> ${data.metadata.file_path}</div>` : ''}
                            </div>
                        `;
                        metadataDiv.innerHTML = metadataHtml;
                        contentArea.appendChild(metadataDiv);
                    }
                    
                    // 显示文档内容
                    const contentDiv = document.createElement('div');
                    contentDiv.style.cssText = `
                        background: #ffffff;
                        padding: 15px;
                        border-radius: 6px;
                        border: 1px solid #e2e8f0;
                        white-space: pre-wrap;
                        word-wrap: break-word;
                        line-height: 1.6;
                    `;
                    
                    // 简单的内容格式化
                    let formattedContent = data.content;
                    
                    // 检测并高亮代码块
                    if (formattedContent.includes('```')) {
                        formattedContent = formattedContent.replace(
                            /```(\w+)?\n([\s\S]*?)```/g,
                            '<div style="background: #f1f5f9; padding: 10px; border-radius: 4px; margin: 10px 0; border-left: 3px solid #64748b;"><code style="font-family: Monaco, monospace; font-size: 0.9rem;">$2</code></div>'
                        );
                    }
                    
                    // 高亮标题
                    formattedContent = formattedContent.replace(
                        /^(#{1,6})\s+(.+)$/gm,
                        '<div style="font-weight: 600; color: #2d3748; margin: 15px 0 8px 0; font-size: 1.1rem;">$2</div>'
                    );
                    
                    // 高亮重要信息
                    formattedContent = formattedContent.replace(
                        /\*\*(.*?)\*\*/g,
                        '<strong style="color: #2d3748;">$1</strong>'
                    );
                    
                    contentDiv.innerHTML = formattedContent;
                    contentArea.appendChild(contentDiv);
                    
                } else {
                    // 显示错误信息
                    contentArea.innerHTML = `
                        <div style="text-align: center; padding: 40px; color: #e53e3e;">
                            <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
                            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">文档预览失败</div>
                            <div style="color: #718096;">${data.message || '未知错误'}</div>
                        </div>
                    `;
                }
            })
            .catch(error => {
                contentArea.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #e53e3e;">
                        <div style="font-size: 48px; margin-bottom: 15px;">🔌</div>
                        <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">网络请求失败</div>
                        <div style="color: #718096;">${error.message}</div>
                    </div>
                `;
            });
    }

    // 使用预览项目数据加载文档内容
    function loadDocumentContentFromArray(dataset, contentArea) {
        const type = dataset.type;
        const params = new URLSearchParams();
        
        // 根据类型设置不同的参数
        if (type === 'file' && dataset.path) {
            params.append('file_path', dataset.path);
        } else if (type === 'url' && dataset.url) {
            params.append('source_url', dataset.url);
        } else if (type === 'item' && dataset.itemId) {
            params.append('item_id', dataset.itemId);
        } else {
            contentArea.innerHTML = `
                <div style="text-align: center; padding: 40px; color: #e53e3e;">
                    <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">参数错误</div>
                    <div style="color: #718096;">无效的预览参数</div>
                </div>
            `;
            return;
        }
        
        fetch(`/api/knowledge/preview?${params}`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // 格式化内容显示
                    const formattedContent = data.content
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/\\n/g, '<br>')
                        .replace(/\\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;');
                    
                    contentArea.innerHTML = `<pre style="white-space: pre-wrap; margin: 0;">${formattedContent}</pre>`;
                    
                    // 如果有元数据，显示元数据信息
                    if (data.metadata && type === 'item') {
                        const metadataDiv = document.createElement('div');
                        metadataDiv.style.cssText = `
                            background: #f8fafc;
                            padding: 15px;
                            border-radius: 6px;
                            margin-bottom: 15px;
                            border-left: 4px solid #4299e1;
                        `;
                        
                        const metadataHtml = `
                            <div style="font-weight: 600; color: #2d3748; margin-bottom: 8px;">📋 文档信息</div>
                            <div style="font-size: 0.9rem; color: #4a5568; line-height: 1.4;">
                                <div><strong>标题:</strong> ${data.metadata.title || '无标题'}</div>
                                <div><strong>领域:</strong> ${data.metadata.domain || '未知'}</div>
                                <div><strong>分类:</strong> ${data.metadata.category || '未知'}</div>
                                <div><strong>标签:</strong> ${(data.metadata.tags || []).join(', ') || '无标签'}</div>
                                <div><strong>创建时间:</strong> ${data.metadata.created_at ? new Date(data.metadata.created_at).toLocaleString() : '未知'}</div>
                                ${data.metadata.source_url ? `<div><strong>原始链接:</strong> ${data.metadata.source_url}</div>` : ''}

                            <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">文档预览失败</div>
                            <div style="color: #718096;">${data.message || '未知错误'}</div>
                        </div>
                    `;
                }
            })
            .catch(error => {
                contentArea.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #e53e3e;">
                        <div style="font-size: 1.1rem; font-weight: 600; margin-bottom: 8px;">网络请求失败</div>
                        <div style="color: #718096;">${error.message}</div>
                    </div>

    }

    // 创建流式内容区域
    function createStreamingSection(type, title) {
        const section = document.createElement('div');
        section.className = `streaming-section streaming-section-${type}`;
        section.innerHTML = `
            <div class="section-header">
                <span class="section-title">${title}</span>
            </div>
            <div class="streaming-content"></div>
        `;
        return section;
    }
    function sendMessage() {
        if (isProcessing) {
            return; // 正在处理中，不允许发送新消息
        }

        const message = messageInput.value.trim();
        if (message && ws.readyState === WebSocket.OPEN) {
            isProcessing = true; // 标记为正在处理
            sendButton.disabled = true; // 禁用发送按钮
            messageInput.disabled = true; // 禁用输入框

            addUserMessage(message);
            showTypingIndicator();
            ws.send(message);
            messageInput.value = '';
        }
    }

    // Enter key to send
    messageInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    // Auto-focus input
    messageInput.focus();

    // Handle WebSocket connection status
    ws.onopen = function() {
        sendButton.disabled = false;
    };

    ws.onclose = function() {
        sendButton.disabled = true;
        messageInput.disabled = true;
        addAIMessage("Connection lost. Please refresh the page.");

        // 连接断开时重置处理状态
        isProcessing = false;
    };
</script>
